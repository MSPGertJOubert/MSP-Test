<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureSolutions Corridor Security Dashboard</title>
  <style>
    :root {
      --bg: #0a1118;
      --bg-panel: #101a24;
      --bg-panel-2: #142230;
      --border: #1f3445;
      --text: #d9e4ee;
      --muted: #8ea3b5;
      --primary: #0f4c9a;
      --teal: #2f9da8;
      --teal-soft: #66c3c7;
      --danger-2: #ff5a5a;
      --warning: #d4a72c;
      --ok: #1f8f68;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
      min-height: 100vh;
    }

    .dashboard { max-width: 1400px; margin: 0 auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: linear-gradient(135deg, var(--bg-panel-2), var(--bg-panel));
      border: 1px solid var(--border);
      border-left: 5px solid var(--teal);
      border-radius: 14px;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .brand-block h1 { margin: 0; font-size: 1.45rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .subtitle { margin: 0; color: var(--muted); font-size: 0.88rem; }

    .status-panel-group { display: flex; gap: 1rem; }

    .status-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 220px;
    }

    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--muted); transition: 0.3s; }
    .status-dot.connected { background: var(--ok); box-shadow: 0 0 12px var(--ok); }
    .status-dot.disconnected { background: var(--danger-2); box-shadow: 0 0 12px var(--danger-2); }

    .status-label { font-size: 0.72rem; text-transform: uppercase; color: var(--muted); }
    #status, #nodeCount { font-size: 0.95rem; font-weight: bold; }

    .main-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.25rem; }
    .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1.25rem; }
    .card-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .card-body { padding: 1.15rem; }

    #alert { padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border); display: none; }
    #alert.movement { display: block; background: rgba(201, 59, 59, 0.15); border-color: var(--danger-2); color: #ffd8d8; }
    #alert.still { display: block; background: rgba(255, 255, 255, 0.03); color: var(--text); }

    .sensor-map { position: relative; min-height: 400px; border: 1px solid var(--border); border-radius: 14px; background: rgba(0,0,0,0.2); overflow: hidden; }
    .corridor-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 4px; background: var(--teal); }
    
    .sensor-node { 
      position: absolute; width: 18px; height: 18px; border-radius: 50%; 
      background: var(--ok); border: 2px solid white; transform: translate(-50%, -50%); 
      transition: 0.3s; z-index: 5;
    }
    .sensor-node.alert { background: var(--danger-2); animation: pulse 1s infinite; }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .log-container { max-height: 300px; overflow-y: auto; }
    .entry { padding: 0.6rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .entry.alert-entry { color: var(--danger-2); font-weight: bold; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="topbar">
      <div class="brand-block">
        <h1>SecureSolutions Security</h1>
        <p class="subtitle">Sishen → Saldanha Corridor Protection</p>
      </div>
      <div class="status-panel-group">
        <div class="status-panel">
          <div id="statusDot" class="status-dot"></div>
          <div class="status-text">
            <div class="status-label">System Server</div>
            <div id="status">Connecting...</div>
          </div>
        </div>
        <div class="status-panel">
          <div class="status-text">
            <div class="status-label">Active Field Nodes</div>
            <div id="nodeCount">0 / 3 Connected</div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-grid">
      <div class="left-column">
        <div class="card">
          <div class="card-header"><h2>Live Threat Status</h2></div>
          <div class="card-body">
            <div id="alert" class="still">Awaiting sensor data...</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2>Corridor Map</h2></div>
          <div class="card-body">
            <div class="sensor-map">
              <div class="corridor-line"></div>
              <div id="node-S1" class="sensor-node" style="left: 15%; top: 50%;"></div>
              <div id="node-S3" class="sensor-node" style="left: 50%; top: 50%;"></div>
              <div id="node-S5" class="sensor-node" style="left: 85%; top: 50%;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="right-column">
        <div class="card">
          <div class="card-header"><h2>System Activity Log</h2></div>
          <div class="card-body">
            <div id="log" class="log-container"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wsUrl = location.protocol === "https:" ? `wss://${location.host}` : `ws://${location.host}`;
    const ws = new WebSocket(wsUrl);

    const statusEl = document.getElementById("status");
    const statusDot = document.getElementById("statusDot");
    const nodeCountEl = document.getElementById("nodeCount");
    const alertBox = document.getElementById("alert");
    const logEl = document.getElementById("log");

    let audioReady = false;
    let audioCtx = null;

    function initAudio() {
      if (audioReady) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioReady = true;
    }

    function playAlarm() {
      if (!audioReady) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    ws.onopen = () => {
      statusEl.textContent = "Online";
      statusDot.className = "status-dot connected";
    };

    ws.onclose = () => {
      statusEl.textContent = "Offline";
      statusDot.className = "status-dot disconnected";
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === "ping") return;

      // Update Node Counter
      if (data.connectedNodes !== undefined) {
        nodeCountEl.textContent = `${data.connectedNodes} / 3 Connected`;
      }

      const sensorId = data.sensorId;
      const nodeEl = document.getElementById(`node-${sensorId}`);

      if (data.movement) {
        if (nodeEl) nodeEl.classList.add("alert");
        alertBox.className = "movement";
        alertBox.innerHTML = `<strong>ALERT:</strong> Movement in ${data.source}! (Delta: ${data.delta})`;
        playAlarm();
        addLogEntry(`ALERT: ${data.source} triggered`, true);
      } else {
        if (nodeEl) nodeEl.classList.remove("alert");
        alertBox.className = "still";
        alertBox.textContent = `System state: ${data.source} is secure.`;
      }
    };

    function addLogEntry(msg, isAlert) {
      const div = document.createElement("div");
      div.className = `entry ${isAlert ? 'alert-entry' : ''}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(div);
    }

    window.addEventListener("click", initAudio, { once: true });
  </script>
</body>
</html>
