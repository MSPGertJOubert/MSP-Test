<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSP Security Dashboard</title>
  <style>
    :root {
      --bg: #0a1118;
      --bg-panel: #101a24;
      --bg-panel-2: #142230;
      --border: #1f3445;
      --text: #d9e4ee;
      --muted: #8ea3b5;
      --primary: #0f4c9a;
      --primary-2: #1d63b8;
      --teal: #2f9da8;
      --teal-soft: #66c3c7;
      --danger: #c93b3b;
      --danger-2: #ff5a5a;
      --ok: #1f8f68;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", "Roboto Mono", monospace;
      background:
        linear-gradient(135deg, rgba(15, 76, 154, 0.18) 0%, rgba(15, 76, 154, 0) 35%),
        linear-gradient(315deg, rgba(47, 157, 168, 0.12) 0%, rgba(47, 157, 168, 0) 40%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      background: linear-gradient(135deg, var(--bg-panel-2), var(--bg-panel));
      border: 1px solid var(--border);
      border-left: 5px solid var(--teal);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .brand-block h1 {
      margin: 0 0 0.35rem 0;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f2f7fb;
    }

    .brand-block .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 260px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--ok);
      box-shadow: 0 0 12px rgba(31, 143, 104, 0.7);
    }

    .status-dot.disconnected {
      background: var(--danger-2);
      box-shadow: 0 0 12px rgba(255, 90, 90, 0.7);
    }

    .status-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .status-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    #status {
      font-size: 0.95rem;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 1.25rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(20, 34, 48, 0.95), rgba(16, 26, 36, 0.98));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--teal));
    }

    .card-header {
      padding: 1rem 1.2rem 0.7rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .card-header h2 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f2f7fb;
    }

    .card-body {
      padding: 1.2rem;
    }

    #alert {
      display: none;
      padding: 1.25rem;
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.5;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    #alert.movement {
      display: block;
      background:
        linear-gradient(135deg, rgba(201, 59, 59, 0.18), rgba(255, 90, 90, 0.1)),
        #241417;
      border-color: rgba(255, 90, 90, 0.4);
      color: #ffd8d8;
      box-shadow: 0 0 24px rgba(201, 59, 59, 0.18);
    }

    #alert.still {
      display: block;
      background:
        linear-gradient(135deg, rgba(47, 157, 168, 0.12), rgba(15, 76, 154, 0.08)),
        #111b24;
      border-color: rgba(102, 195, 199, 0.25);
      color: var(--text);
    }

    .alert-title {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.9rem;
      margin-top: 1rem;
    }

    .kpi {
      padding: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.025);
    }

    .kpi-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .kpi-value {
      font-size: 1.15rem;
      color: #f2f7fb;
      font-weight: 700;
    }

    #log {
      max-height: 430px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .entry {
      padding: 0.85rem 0.9rem;
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      font-size: 0.88rem;
      color: var(--text);
    }

    .entry.alert-entry {
      border-left-color: var(--danger-2);
      background: rgba(201, 59, 59, 0.08);
    }

    .entry-meta {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .empty-log {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.35rem 0;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .kpi-row {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .status-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="topbar">
      <div class="brand-block">
        <h1>SecureSolutions Security Dashboard</h1>
        <p class="subtitle">Corridor Monitoring • Sensor Alerts • Incident Response</p>
      </div>

      <div class="status-panel">
        <div id="statusDot" class="status-dot"></div>
        <div class="status-text">
          <div class="status-label">Connection Status</div>
          <div id="status">Connecting...</div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <h2>Live Threat Status</h2>
        </div>
        <div class="card-body">
          <div id="alert" class="still">
            <span class="alert-title">System State</span>
            Awaiting sensor data...
          </div>

          <div class="kpi-row">
            <div class="kpi">
              <div class="kpi-label">Total Alerts</div>
              <div id="totalAlerts" class="kpi-value">0</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Last Delta</div>
              <div id="lastDelta" class="kpi-value">--</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Last Update</div>
              <div id="lastUpdate" class="kpi-value">--:--:--</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>System Activity</h2>
        </div>
        <div class="card-body">
          <div id="log">
            <div class="empty-log">No alerts received yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wsUrl =
      location.protocol === "https:"
        ? `wss://${location.host}`
        : `ws://${location.host}`;

    const ws = new WebSocket(wsUrl);

    const status = document.getElementById("status");
    const statusDot = document.getElementById("statusDot");
    const alertBox = document.getElementById("alert");
    const log = document.getElementById("log");
    const totalAlertsEl = document.getElementById("totalAlerts");
    const lastDeltaEl = document.getElementById("lastDelta");
    const lastUpdateEl = document.getElementById("lastUpdate");

    let totalAlerts = 0;
    let audioReady = false;
    let audioCtx = null;

    function initAudio() {
      if (audioReady) return;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      audioCtx = new AudioContextClass();

      if (audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
      }

      audioReady = true;
    }

    function playAlarmCue() {
      if (!audioReady || !audioCtx) return;

      const now = audioCtx.currentTime;

      const masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.0001, now);
      masterGain.connect(audioCtx.destination);

      const oscillator1 = audioCtx.createOscillator();
      oscillator1.type = "square";
      oscillator1.frequency.setValueAtTime(880, now);

      const oscillator2 = audioCtx.createOscillator();
      oscillator2.type = "square";
      oscillator2.frequency.setValueAtTime(660, now);

      oscillator1.connect(masterGain);
      oscillator2.connect(masterGain);

      oscillator1.start(now);
      oscillator2.start(now + 0.12);

      masterGain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);

      masterGain.gain.setValueAtTime(0.0001, now + 0.35);
      masterGain.gain.exponentialRampToValueAtTime(0.18, now + 0.37);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);

      oscillator1.stop(now + 0.7);
      oscillator2.stop(now + 0.7);
    }

    function markConnected(isConnected) {
      statusDot.classList.remove("connected", "disconnected");
      statusDot.classList.add(isConnected ? "connected" : "disconnected");
    }

    function addLogEntry(message, isAlert = false) {
      const empty = log.querySelector(".empty-log");
      if (empty) empty.remove();

      const entry = document.createElement("div");
      entry.className = `entry${isAlert ? " alert-entry" : ""}`;

      const time = new Date().toLocaleTimeString();

      entry.innerHTML = `
        <span class="entry-meta">${time}</span>
        ${message}
      `;

      log.prepend(entry);
    }

    ws.onopen = () => {
      status.textContent = "Connected";
      status.style.color = "#d9e4ee";
      markConnected(true);
      addLogEntry("WebSocket session established.");
    };

    ws.onclose = () => {
      status.textContent = "Disconnected";
      status.style.color = "#ff9b9b";
      markConnected(false);
      addLogEntry("WebSocket session lost.", true);
    };

    ws.onerror = () => {
      addLogEntry("Connection error detected.", true);
    };

    ws.onmessage = (event) => {
      let data;

      try {
        data = JSON.parse(event.data);
      } catch (error) {
        addLogEntry("Invalid payload received from sensor stream.", true);
        return;
      }

      const time = new Date().toLocaleTimeString();
      const deltaText =
        typeof data.delta === "number" ? data.delta.toFixed(2) : "N/A";

      lastDeltaEl.textContent = deltaText;
      lastUpdateEl.textContent = time;

      if (data.movement) {
        totalAlerts += 1;
        totalAlertsEl.textContent = totalAlerts;

        alertBox.className = "movement";
        alertBox.style.display = "block";
        alertBox.innerHTML = `
          <span class="alert-title">Active Security Alert</span>
          MOVEMENT DETECTED — Sensor disturbance registered.<br />
          <strong>Delta:</strong> ${deltaText}
        `;

        playAlarmCue();

        addLogEntry(
          `ALERT: Movement detected | delta: ${deltaText}`,
          true
        );
      } else {
        alertBox.className = "still";
        alertBox.style.display = "block";
        alertBox.innerHTML = `
          <span class="alert-title">System State</span>
          No movement detected.<br />
          <strong>Delta:</strong> ${deltaText}
        `;

        addLogEntry(
          `Status normal | movement: false | delta: ${deltaText}`,
          false
        );
      }
    };

    // Browsers usually require a user gesture before audio can play.
    // This arms the alarm on first click, tap, or keypress.
    ["click", "touchstart", "keydown"].forEach((eventName) => {
      window.addEventListener(
        eventName,
        () => {
          initAudio();
        },
        { once: true }
      );
    });

    markConnected(false);
  </script>
</body>
</html>
